<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhwa Beauty — Coming Soon</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f2eb;
    --warm-white: #fdfaf6;
    --ink: #1c1a17;
    --muted: #7a7060;
    --sage: #8a9e88;
    --gold: #b09060;
    --border: rgba(140,120,90,.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }

  .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 28px auto;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 400;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .message {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 420px;
  }

  .contact {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .contact a {
    color: var(--ink);
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    transition: border-color 0.3s;
  }

  .contact a:hover {
    border-color: var(--gold);
  }

  .footer {
    position: fixed;
    bottom: 24px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <div class="logo-text">Minhwa Beauty</div>
  <div class="tagline">민화뷰티</div>
  <div class="subtitle">Korean Heritage Skincare</div>

  <div class="divider"></div>

  <p class="message">
    We're preparing something beautiful.<br>
    Our website will be available soon.
  </p>

  <div class="contact">
    <a href="mailto:hello@minhwa-beauty.com">hello@minhwa-beauty.com</a>
  </div>

  <div class="footer">&copy; 2026 Minhwa Beauty</div>

</body>
</html>
